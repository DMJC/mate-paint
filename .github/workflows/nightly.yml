name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch:        # allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deb-package:
    name: Debian package (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: bookworm
            container: debian:bookworm
          - distro: noble
            container: ubuntu:24.04

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential \
            devscripts \
            debhelper \
            meson \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            gettext

      - name: Set nightly version
        id: version
        run: |
          BASE_VERSION=$(dpkg-parsechangelog --show-field Version | sed 's/-[^-]*$//')
          DATE=$(date -u +%Y%m%d)
          COMMIT=$(echo "$GITHUB_SHA" | cut -c1-8)
          NIGHTLY_VERSION="${BASE_VERSION}~nightly${DATE}.${COMMIT}-1"
          echo "version=${NIGHTLY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Nightly version: ${NIGHTLY_VERSION}"

      - name: Update debian/changelog for nightly
        env:
          DEBEMAIL: jcarthew@gmail.com
          DEBFULLNAME: James Carthew
        run: |
          NIGHTLY_VERSION="${{ steps.version.outputs.version }}"
          DISTRO="${{ matrix.distro }}"
          COMMIT=$(echo "$GITHUB_SHA" | cut -c1-8)
          dch --newversion "${NIGHTLY_VERSION}" \
              --distribution "${DISTRO}" \
              --force-distribution \
              -b \
              "Nightly build $(date -u +%Y-%m-%d) (${COMMIT})"

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect packages
        run: |
          mkdir -p packages
          mv ../*.deb ../*.buildinfo ../*.changes packages/ 2>/dev/null || true
          ls -lh packages/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: mate-paint-nightly-${{ matrix.distro }}-${{ steps.version.outputs.version }}
          path: packages/
          retention-days: 14
          if-no-files-found: error

  create-release:
    name: Publish nightly release
    runs-on: ubuntu-latest
    needs: deb-package
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: all-packages/
          pattern: mate-paint-nightly-*
          merge-multiple: false

      - name: Flatten package files
        run: |
          mkdir -p release-assets
          find all-packages/ -name "*.deb" -exec cp {} release-assets/ \;
          find all-packages/ -name "*.buildinfo" -exec cp {} release-assets/ \;
          find all-packages/ -name "*.changes" -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Delete previous nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes 2>/dev/null || true
          git push --delete origin nightly 2>/dev/null || true

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          COMMIT=$(echo "$GITHUB_SHA" | cut -c1-8)
          cat > /tmp/release-notes.md << EOF
          Automated nightly build from commit ${COMMIT} on ${DATE}.

          Built packages:
          - Debian Bookworm (amd64)
          - Ubuntu Noble (amd64)

          These packages are built automatically and may be unstable.
          EOF
          gh release create nightly \
            --title "Nightly build ${DATE}" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
            --target main \
            release-assets/*.deb \
            release-assets/*.buildinfo \
            release-assets/*.changes
